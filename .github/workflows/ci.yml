name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ________ Jobs ________
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build watch app debug APK
        id: build_app
        run: ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee /tmp/app-build.log; exit ${PIPESTATUS[0]}

      - name: Build companion app debug APK
        id: build_mobile
        if: success() || steps.build_app.outcome == 'failure'
        run: ./gradlew :mobile:assembleDebug --stacktrace 2>&1 | tee /tmp/mobile-build.log; exit ${PIPESTATUS[0]}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/app-build.log
            /tmp/mobile-build.log

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git rev-list --count gives real versionCode

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > $RUNNER_TEMP/dashcode.jks

      - name: Build release AABs
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/dashcode.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease :mobile:bundleRelease

      - name: Write service account JSON
        run: |
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" | base64 --decode > $RUNNER_TEMP/play-service-account.json

      - name: Upload both AABs to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: ${{ runner.temp }}/play-service-account.json
          packageName: com.vernonit.dashcode
          releaseFiles: app/build/outputs/bundle/release/app-release.aab,mobile/build/outputs/bundle/release/mobile-release.aab
          tracks: internal
          status: completed
